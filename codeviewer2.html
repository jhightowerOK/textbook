<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Code Viewer</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <link
      id="theme-link"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css"
    />

    <style>
      :root {
        --bg-dark: #282c34;
        --bg-light: #ffffff;
        --header-dark: #212529;
        --header-light: #f8f9fa;
      }

      .code-container {
        border-radius: 8px;
        overflow: hidden;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 0, 0, 0.1);
      }

      /* Dark Mode (Default) */
      .mode-dark {
        background-color: var(--bg-dark);
        color: white;
      }
      .mode-dark .code-header {
        background: var(--header-dark);
        color: #adb5bd;
      }

      /* Light Mode */
      .mode-light {
        background-color: var(--bg-light);
        color: black;
      }
      .mode-light .code-header {
        background: var(--header-light);
        color: #495057;
      }
      .mode-light .btn-outline-light {
        color: #212529;
        border-color: #dee2e6;
      }

      pre {
        margin-bottom: 0;
      }
      code {
        font-family: "Fira Code", monospace;
        padding: 1.5rem !important;
      }

      /* Line Number Styling */
      .hljs-ln-numbers {
        padding-right: 15px !important;
        border-right: 1px solid rgba(128, 128, 128, 0.2);
        text-align: right;
        color: #6c757d;
        user-select: none;
      }
      .hljs-ln-code {
        padding-left: 15px !important;
      }
    </style>
  </head>
  <body class="bg-secondary-subtle p-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-9">
          <div id="mainContainer" class="code-container shadow mode-dark">
            <div
              class="code-header d-flex justify-content-between align-items-center px-3 py-2"
            >
              <div class="d-flex align-items-center">
                <i class="bi bi-file-earmark-code me-2"></i>
                <span class="small fw-bold">main.py</span>
              </div>

              <div class="btn-group">
                <button
                  class="btn btn-sm btn-outline-light border-0"
                  onclick="toggleTheme()"
                  title="Toggle Light/Dark"
                >
                  <i id="themeIcon" class="bi bi-sun-fill"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-light border-0"
                  onclick="copyCode(this)"
                  title="Copy Code"
                >
                  <i class="bi bi-clipboard"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-light border-0"
                  onclick="downloadCode()"
                  title="Download"
                >
                  <i class="bi bi-download"></i>
                </button>
              </div>
            </div>

            <pre><code id="codeBlock" class="language-python">
import random

def get_fortune():
    fortunes = ["Success is near", "Code more, worry less", "Error 404: Fortune not found"]
    return random.choice(fortunes)

if __name__ == "__main__":
    print(f"Your fortune: {get_fortune()}")
                </code></pre>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>

    <script>
      hljs.highlightAll();
      hljs.initLineNumbersOnLoad();

      const darkTheme =
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css";
      const lightTheme =
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/intellij-light.min.css";

      function toggleTheme() {
        const container = document.getElementById("mainContainer");
        const themeLink = document.getElementById("theme-link");
        const themeIcon = document.getElementById("themeIcon");

        if (container.classList.contains("mode-dark")) {
          // Switch to Light
          container.classList.replace("mode-dark", "mode-light");
          themeLink.href = lightTheme;
          themeIcon.classList.replace("bi-sun-fill", "bi-moon-stars-fill");
        } else {
          // Switch to Dark
          container.classList.replace("mode-light", "mode-dark");
          themeLink.href = darkTheme;
          themeIcon.classList.replace("bi-moon-stars-fill", "bi-sun-fill");
        }
      }

      function copyCode(btn) {
        const icon = btn.querySelector("i");
        const codeText = document.getElementById("codeBlock").innerText;

        navigator.clipboard.writeText(codeText).then(() => {
          icon.classList.replace("bi-clipboard", "bi-check-lg");
          btn.classList.add("text-success");

          setTimeout(() => {
            icon.classList.replace("bi-check-lg", "bi-clipboard");
            btn.classList.remove("text-success");
          }, 2000);
        });
      }

      function downloadCode() {
        const codeText = document.getElementById("codeBlock").innerText;
        const blob = new Blob([codeText], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "main.py";
        a.click();
        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>
